name: Feature request
description: Propose a focused TwinTidy improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user problem without prescribing implementation first.
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should a person be able to accomplish?
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: File-safety and privacy considerations
      description: Explain whether the idea reads new data, changes matching, previews content, performs destructive actions, accesses a network, or collects diagnostics.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or narrower approaches.

  - type: checkboxes
    id: terms
    attributes:
      label: Scope confirmation
      options:
        - label: This request preserves TwinTidy's local-first, safety-first product direction.
          required: true
